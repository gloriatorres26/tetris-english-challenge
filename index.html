<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Tetris English Class</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="gameWrapper">

<h1>Tetris English Challenge</h1>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" 

rel="stylesheet">

<div id="startScreen">

<h2>English Tetris Challenge</h2>

<button id="startBtn">

START GAME

</button>

<input id="playerName"

placeholder="Write your name"

style="padding:10px;margin-top:10px;">

<input id="roomCode"

placeholder="Class Code"

style="padding:10px;margin-top:10px;">

</div>

<div id="container">

<canvas id="game" width="300" height="600"></canvas>

<div id="scoreboard">

<div id="ranking">

<h2>🏆 Students Ranking</h2>

<ul id="playersList"></ul>

</div>

<h2>Puntos de tetris</h2>

<p id="score">0</p>

<h2>Time</h2>
<p id="gameTimerDisplay">120</p>

</div>

</div>


<div id="quiz" class="hidden">

<h2 id="question"></h2>

<div id="answers"></div>

</div>

<div id="gameOver" class="hidden">

<h1>GAME OVER</h1>

<button class="againBtn" onclick="playAgain()">
PLAY AGAIN
</button>

</div>

<audio id="music" loop>

<source src="music.mp3">

</audio>

<audio id="correctSound">
<source src="correct.mp3">
</audio>

<audio id="wrongSound">
<source src="wrong.mp3">
</audio>
